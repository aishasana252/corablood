{% extends 'base.html' %}

{% block content %}
<div class="h-full flex flex-col" x-data="vitalSettings()">

    <!-- Header -->
    <div class="mb-6 flex justify-between items-center">
        <div>
            <h1 class="text-2xl font-bold text-white">Vital Sign Configuration</h1>
            <p class="text-slate-400 text-sm">Define safety limits for donor eligibility.</p>
        </div>
        <button @click="saveLimits()"
            class="px-6 py-2 bg-gradient-to-r from-emerald-500 to-teal-500 hover:from-emerald-600 hover:to-teal-600 text-white rounded-lg font-medium transition-all shadow-lg flex items-center">
            <span x-show="!saving">Save Limits</span>
            <span x-show="saving" class="flex items-center">
                <svg class="animate-spin -ml-1 mr-2 h-4 w-4 text-white" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor"
                        d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                    </path>
                </svg>
                Saving...
            </span>
        </button>
    </div>

    <!-- Loading State -->
    <div x-show="loading" class="flex-1 flex items-center justify-center">
        <div class="flex flex-col items-center space-y-4">
            <div class="w-12 h-12 border-4 border-slate-700 border-t-emerald-500 rounded-full animate-spin"></div>
            <p class="text-slate-400 animate-pulse">Loading configuration...</p>
        </div>
    </div>

    <!-- Settings Form -->
    <div x-show="!loading" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 animate-fade-in-up">

        <!-- General Limits -->
        <div class="bg-slate-800/50 backdrop-blur-sm border border-slate-700/50 rounded-xl p-6">
            <h3 class="text-lg font-bold text-white mb-4 flex items-center">
                <span class="w-2 h-6 bg-blue-500 rounded-full mr-3"></span>
                General Limits
            </h3>
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Min Weight
                        (kg)</label>
                    <input type="number" step="0.1" x-model="limits.min_weight_kg"
                        class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-3 text-white focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Min
                        Hemoglobin (g/dl)</label>
                    <input type="number" step="0.1" x-model="limits.min_hemoglobin"
                        class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-3 text-white focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Max
                        Temperature (C)</label>
                    <input type="number" step="0.1" x-model="limits.max_temperature_c"
                        class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-3 text-white focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all">
                </div>
            </div>
        </div>

        <!-- Blood Pressure -->
        <div class="bg-slate-800/50 backdrop-blur-sm border border-slate-700/50 rounded-xl p-6">
            <h3 class="text-lg font-bold text-white mb-4 flex items-center">
                <span class="w-2 h-6 bg-red-500 rounded-full mr-3"></span>
                Blood Pressure (mmHg)
            </h3>
            <div class="space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[10px] font-semibold text-slate-500 uppercase tracking-wider mb-1">Min
                            Systolic</label>
                        <input type="number" x-model="limits.min_systolic"
                            class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-white text-sm focus:ring-1 focus:ring-red-500">
                    </div>
                    <div>
                        <label class="block text-[10px] font-semibold text-slate-500 uppercase tracking-wider mb-1">Max
                            Systolic</label>
                        <input type="number" x-model="limits.max_systolic"
                            class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-white text-sm focus:ring-1 focus:ring-red-500">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[10px] font-semibold text-slate-500 uppercase tracking-wider mb-1">Min
                            Diastolic</label>
                        <input type="number" x-model="limits.min_diastolic"
                            class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-white text-sm focus:ring-1 focus:ring-red-500">
                    </div>
                    <div>
                        <label class="block text-[10px] font-semibold text-slate-500 uppercase tracking-wider mb-1">Max
                            Diastolic</label>
                        <input type="number" x-model="limits.max_diastolic"
                            class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-white text-sm focus:ring-1 focus:ring-red-500">
                    </div>
                </div>
            </div>
        </div>

        <!-- Pulse -->
        <div class="bg-slate-800/50 backdrop-blur-sm border border-slate-700/50 rounded-xl p-6">
            <h3 class="text-lg font-bold text-white mb-4 flex items-center">
                <span class="w-2 h-6 bg-emerald-500 rounded-full mr-3"></span>
                Pulse (BPM)
            </h3>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Min
                        Pulse</label>
                    <input type="number" x-model="limits.min_pulse"
                        class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-3 text-white focus:ring-2 focus:ring-emerald-500 focus:border-transparent outline-none transition-all">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Max
                        Pulse</label>
                    <input type="number" x-model="limits.max_pulse"
                        class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-3 text-white focus:ring-2 focus:ring-emerald-500 focus:border-transparent outline-none transition-all">
                </div>
            </div>
        </div>

    </div>
</div>

<script>
    function vitalSettings() {
        return {
            loading: true,
            saving: false,
            limits: {},

            async init() {
                try {
                    const res = await fetch('/api/vital-limits/');
                    const data = await res.json();
                    if (data.length > 0) {
                        this.limits = data[0];
                    }
                } catch (e) {
                    console.error("Error fetching vitals config", e);
                    alert("Failed to load settings.");
                } finally {
                    this.loading = false;
                }
            },

            async saveLimits() {
                this.saving = true;
                try {
                    const res = await fetch(`/api/vital-limits/${this.limits.id}/`, {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-CSRFToken': '{{ csrf_token }}'
                        },
                        body: JSON.stringify(this.limits)
                    });

                    if (res.ok) {
                        alert("Configuration saved successfully!");
                    } else {
                        throw new Error('Save failed');
                    }
                } catch (e) {
                    alert("Error saving configuration.");
                    console.error(e);
                } finally {
                    this.saving = false;
                }
            }
        }
    }
</script>
{% endblock %}
