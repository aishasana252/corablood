{% extends 'base.html' %}

{% block title %}Blood Inventory | CoraBlood AI{% endblock %}
{% block header %}
<span x-text="lang === 'en' ? 'Live Inventory' : 'مخزون الدم المباشر'"></span>
{% endblock %}

{% block content %}
<div x-data="inventoryDashboard()" x-init="fetchStats()" class="space-y-8">

    <!-- Overview Cards -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <!-- Total Units -->
        <div
            class="group relative overflow-hidden bg-white/60 backdrop-blur-xl p-6 rounded-[2rem] border border-white/60 shadow-lg hover:-translate-y-1 transition-all duration-300">
            <div
                class="absolute top-0 right-0 -mr-8 -mt-8 w-24 h-24 bg-brand-100 rounded-full blur-2xl group-hover:bg-brand-200 transition-colors">
            </div>
            <div class="relative z-10">
                <div class="flex items-center justify-between mb-4">
                    <p class="text-sm font-bold text-slate-500 uppercase tracking-wider"
                        x-text="lang === 'en' ? 'Total Units' : 'إجمالي الوحدات'"></p>
                    <div class="p-2 bg-brand-50 rounded-xl text-brand-600">
                        <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M19.428 15.428a2 2 0 00-1.022-.547l-2.384-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z" />
                        </svg>
                    </div>
                </div>
                <h3 class="text-4xl font-display font-bold text-slate-800" x-text="totalUnits">0</h3>
                <p class="text-xs font-medium text-green-600 mt-2 flex items-center gap-1">
                    <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" />
                    </svg>
                    <span>+12 today</span>
                </p>
            </div>
        </div>

        <!-- Expiring Soon -->
        <div
            class="group relative overflow-hidden bg-white/60 backdrop-blur-xl p-6 rounded-[2rem] border border-white/60 shadow-lg hover:-translate-y-1 transition-all duration-300">
            <div
                class="absolute top-0 right-0 -mr-8 -mt-8 w-24 h-24 bg-amber-100 rounded-full blur-2xl group-hover:bg-amber-200 transition-colors">
            </div>
            <div class="relative z-10">
                <div class="flex items-center justify-between mb-4">
                    <p class="text-sm font-bold text-slate-500 uppercase tracking-wider"
                        x-text="lang === 'en' ? 'Expiring Soon' : 'تنتهي صلاحيتها قريباً'"></p>
                    <div class="p-2 bg-amber-50 rounded-xl text-amber-600">
                        <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                        </svg>
                    </div>
                </div>
                <h3 class="text-4xl font-display font-bold text-slate-800">5</h3>
                <p class="text-xs font-medium text-amber-600 mt-2">Action required</p>
            </div>
        </div>

        <!-- Critical Types -->
        <div
            class="group relative overflow-hidden bg-white/60 backdrop-blur-xl p-6 rounded-[2rem] border border-white/60 shadow-lg hover:-translate-y-1 transition-all duration-300">
            <div
                class="absolute top-0 right-0 -mr-8 -mt-8 w-24 h-24 bg-rose-100 rounded-full blur-2xl group-hover:bg-rose-200 transition-colors">
            </div>
            <div class="relative z-10">
                <div class="flex items-center justify-between mb-4">
                    <p class="text-sm font-bold text-slate-500 uppercase tracking-wider"
                        x-text="lang === 'en' ? 'Critical Low' : 'نقص حاد'"></p>
                    <div class="p-2 bg-rose-50 rounded-xl text-rose-600">
                        <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                        </svg>
                    </div>
                </div>
                <div class="flex gap-2">
                    <span class="px-3 py-1 bg-rose-100 text-rose-700 rounded-lg text-sm font-bold">O-</span>
                    <span class="px-3 py-1 bg-rose-100 text-rose-700 rounded-lg text-sm font-bold">AB-</span>
                </div>
                <p class="text-xs font-medium text-rose-600 mt-3"
                    x-text="lang === 'en' ? 'Notify donors immediately' : 'أبلغ المتبرعين فوراً'"></p>
            </div>
        </div>
    </div>

    <!-- Blood Group Grid -->
    <div>
        <h3 class="text-xl font-display font-bold text-slate-800 mb-6 flex items-center gap-2">
            <span class="w-2 h-8 bg-brand-500 rounded-full"></span>
            <span x-text="lang === 'en' ? 'Stock by Blood Group' : 'المخزون حسب الفصيلة'"></span>
        </h3>

        <div class="grid grid-cols-2 lg:grid-cols-4 gap-6">
            <template x-for="group in bloodGroups" :key="group.type">
                <div
                    class="bg-white/70 backdrop-blur-md rounded-3xl p-6 border border-white shadow-sm hover:shadow-xl hover:scale-[1.02] transition-all duration-300 group cursor-default">
                    <div class="flex justify-between items-start mb-4">
                        <div class="w-12 h-12 rounded-2xl flex items-center justify-center text-xl font-black text-white shadow-md relative overflow-hidden"
                            :class="{
                                'bg-gradient-to-br from-brand-500 to-rose-600 shadow-brand-500/30': ['O+', 'O-'].includes(group.type),
                                'bg-gradient-to-br from-blue-500 to-indigo-600 shadow-blue-500/30': !['O+', 'O-'].includes(group.type)
                             }">
                            <span class="relative z-10" x-text="group.type"></span>
                            <!-- Bubble animation -->
                            <div
                                class="absolute inset-0 bg-white opacity-10 rounded-full scale-0 group-hover:scale-150 transition-transform duration-500">
                            </div>
                        </div>

                        <!-- Mini visual indicator -->
                        <div class="flex flex-col gap-0.5 items-end">
                            <template x-for="i in 3">
                                <div class="w-1.5 h-1.5 rounded-full bg-slate-200"
                                    :class="{'!bg-green-400': i <= Math.ceil(group.count / 10)}"></div>
                            </template>
                        </div>
                    </div>

                    <div class="space-y-1">
                        <p class="text-3xl font-display font-bold text-slate-800" x-text="group.count">0</p>
                        <p class="text-xs font-bold text-slate-400 uppercase tracking-widest">Units Available</p>
                    </div>

                    <div class="mt-4 pt-4 border-t border-slate-100 flex justify-between items-center">
                        <span class="text-xs font-medium text-slate-400">Whole Blood</span>
                        <div class="w-16 h-1.5 bg-slate-100 rounded-full overflow-hidden">
                            <div class="h-full bg-slate-800 rounded-full" style="width: 80%"></div>
                        </div>
                    </div>
                </div>
            </template>
        </div>
    </div>
</div>

{% endblock %}

{% block extra_js %}
<script>
    function inventoryDashboard() {
        return {
            loading: true,
            totalUnits: 0,
            lang: localStorage.getItem('cora_lang') || 'en',
            bloodGroups: [
                { type: 'A+', count: 124 },
                { type: 'A-', count: 45 },
                { type: 'B+', count: 88 },
                { type: 'B-', count: 12 }, // Low
                { type: 'O+', count: 210 },
                { type: 'O-', count: 8 },  // Critical
                { type: 'AB+', count: 34 },
                { type: 'AB-', count: 15 }
            ],

            async fetchStats() {
                // In a real app, we would fetch aggregation from API
                // For now, using dummy static data for the "Premium Look" demo

                // Simulate loading
                setTimeout(() => {
                    this.totalUnits = this.bloodGroups.reduce((acc, curr) => acc + curr.count, 0);
                    this.loading = false;
                }, 500);
            }
        }
    }
</script>
{% endblock %}
