{% extends "base.html" %}

{% block content %}
<div class="max-w-4xl mx-auto">
    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
        <div class="p-6 border-b border-slate-100 bg-slate-50 flex justify-between items-center">
            <div>
                <h2 class="text-xl font-bold text-slate-800">New Donor Registration</h2>
                <p class="text-sm text-slate-500">Enter donor demographics and identification details.</p>
            </div>
        </div>

        <form method="post" class="p-8">
            {% csrf_token %}

            {% if error %}
            <div class="mb-6 bg-rose-50 border border-rose-200 text-rose-600 px-4 py-3 rounded-xl flex items-center">
                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
                {{ error }}
            </div>
            {% endif %}

            <div class="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-6">
                <!-- Identification -->
                <div class="col-span-2">
                    <h3
                        class="text-sm font-bold text-slate-400 uppercase tracking-wider mb-4 border-b border-slate-100 pb-2">
                        Identification</h3>
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">National ID / Iqama <span
                            class="text-rose-500">*</span></label>
                    <input type="text" name="national_id" required pattern="\d+" title="Numbers only"
                        class="w-full px-4 py-2.5 rounded-xl border border-slate-300 focus:border-rose-500 focus:ring-2 focus:ring-rose-500/20 outline-none transition-all placeholder-slate-400 text-slate-800 font-mono"
                        placeholder="e.g. 1012345678">
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Mobile Number <span
                            class="text-rose-500">*</span></label>
                    <input type="tel" name="mobile" required
                        class="w-full px-4 py-2.5 rounded-xl border border-slate-300 focus:border-rose-500 focus:ring-2 focus:ring-rose-500/20 outline-none transition-all placeholder-slate-400 text-slate-800 font-mono"
                        placeholder="05XXXXXXXX">
                </div>

                <!-- Personal Info -->
                <div class="col-span-2 mt-2">
                    <h3
                        class="text-sm font-bold text-slate-400 uppercase tracking-wider mb-4 border-b border-slate-100 pb-2">
                        Personal Information</h3>
                </div>

                <div class="col-span-2">
                    <label class="block text-sm font-medium text-slate-700 mb-1">Full Name (English) <span
                            class="text-rose-500">*</span></label>
                    <input type="text" name="full_name" required
                        class="w-full px-4 py-2.5 rounded-xl border border-slate-300 focus:border-rose-500 focus:ring-2 focus:ring-rose-500/20 outline-none transition-all placeholder-slate-400 text-slate-800 uppercase"
                        placeholder="FIRST LAST">
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Date of Birth <span
                            class="text-rose-500">*</span></label>
                    <input type="date" name="date_of_birth" required
                        class="w-full px-4 py-2.5 rounded-xl border border-slate-300 focus:border-rose-500 focus:ring-2 focus:ring-rose-500/20 outline-none transition-all text-slate-800">
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Gender <span
                            class="text-rose-500">*</span></label>
                    <select name="gender" required
                        class="w-full px-4 py-2.5 rounded-xl border border-slate-300 focus:border-rose-500 focus:ring-2 focus:ring-rose-500/20 outline-none transition-all text-slate-800 bg-white">
                        <option value="M">Male</option>
                        <option value="F">Female</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Nationality</label>
                    <select name="nationality"
                        class="w-full px-4 py-2.5 rounded-xl border border-slate-300 focus:border-rose-500 focus:ring-2 focus:ring-rose-500/20 outline-none transition-all text-slate-800 bg-white">
                        {% for n in nationalities %}
                        <option value="{{ n.name_en }}" {% if n.is_default %}selected{% endif %}>{{ n.name_en }}
                        </option>
                        {% empty %}
                        <option value="Saudi Arabia" selected>Saudi Arabia</option>
                        {% endfor %}
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Blood Group (If Known)</label>
                    <select name="blood_group"
                        class="w-full px-4 py-2.5 rounded-xl border border-slate-300 focus:border-rose-500 focus:ring-2 focus:ring-rose-500/20 outline-none transition-all text-slate-800 bg-white">
                        <option value="UNKNOWN">Unknown / Not Sure</option>
                        <option value="O+">O+</option>
                        <option value="O-">O-</option>
                        <option value="A+">A+</option>
                        <option value="A-">A-</option>
                        <option value="B+">B+</option>
                        <option value="B-">B-</option>
                        <option value="AB+">AB+</option>
                        <option value="AB-">AB-</option>
                    </select>
                </div>

            </div>

            <div class="mt-8 flex justify-end space-x-4 border-t border-slate-100 pt-6">
                <a href="{% url 'donor_list' %}"
                    class="px-6 py-2.5 rounded-xl border border-slate-300 text-slate-700 font-medium hover:bg-slate-50 transition-all">Cancel</a>
                <button type="submit"
                    class="px-6 py-2.5 rounded-xl bg-rose-600 text-white font-bold hover:bg-rose-700 shadow-lg shadow-rose-500/30 transition-all transform active:scale-95">Register
                    Donor</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
