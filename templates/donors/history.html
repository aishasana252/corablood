{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="min-h-screen bg-slate-50 py-8" x-data="donorHistory({{ donor.id }})">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">

        <!-- Header -->
        <div class="mb-8 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <button @click="window.history.back()" class="p-2 hover:bg-slate-200 rounded-lg transition-colors">
                    <svg class="w-6 h-6 text-slate-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                    </svg>
                </button>
                <div>
                    <h1 class="text-3xl font-bold text-slate-900">{{ donor.full_name }}</h1>
                    <p class="text-slate-500 font-mono text-sm mt-1">ID: {{ donor.national_id }} &bull; File: {{
                        donor.donor_code }}</p>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <div class="px-4 py-2 bg-red-100 text-red-700 rounded-xl font-bold flex flex-col items-center">
                    <span class="text-xs uppercase tracking-wide opacity-75">Blood Group</span>
                    <span class="text-xl" x-text="stats.blood_group || 'Unknown'"></span>
                </div>
            </div>
        </div>

        <!-- Stats Grid -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                <div class="flex items-center gap-4">
                    <div class="p-3 bg-red-50 text-red-600 rounded-xl">
                        <svg class="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" />
                        </svg>
                    </div>
                    <div>
                        <p class="text-slate-500 font-medium">Total Donations</p>
                        <h3 class="text-3xl font-bold text-slate-900" x-text="stats.total_donations || 0"></h3>
                    </div>
                </div>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                <div class="flex items-center gap-4">
                    <div class="p-3 bg-blue-50 text-blue-600 rounded-xl">
                        <svg class="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M19.428 15.428a2 2 0 00-1.022-.547l-2.384-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z" />
                        </svg>
                    </div>
                    <div>
                        <p class="text-slate-500 font-medium">Components Created</p>
                        <h3 class="text-3xl font-bold text-slate-900" x-text="totalComponents"></h3>
                    </div>
                </div>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                <div class="flex items-center gap-4">
                    <div class="p-3 bg-green-50 text-green-600 rounded-xl">
                        <svg class="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M14.828 14.828a4 4 0 01-5.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                        </svg>
                    </div>
                    <div>
                        <p class="text-slate-500 font-medium">Status</p>
                        <h3 class="text-xl font-bold text-green-600">Active Donor</h3>
                    </div>
                </div>
            </div>
        </div>

        <!-- History Timeline -->
        <h2 class="text-xl font-bold text-slate-900 mb-6">Donation Timeline</h2>

        <div class="space-y-6">
            <template x-for="donation in stats.timeline" :key="donation.id">
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                    <!-- Donation Header -->
                    <div class="p-6 border-b border-slate-50 flex items-center justify-between bg-slate-50/50">
                        <div class="flex items-center gap-4">
                            <div
                                class="w-12 h-12 bg-white border border-slate-200 rounded-xl flex items-center justify-center font-bold text-slate-700 shadow-sm">
                                <span class="text-lg">🩸</span>
                            </div>
                            <div>
                                <h3 class="text-lg font-bold text-slate-900"
                                    x-text="new Date(donation.date).toLocaleDateString()"></h3>
                                <div class="flex items-center gap-2 text-sm">
                                    <span class="font-mono text-slate-500" x-text="donation.code"></span>
                                    <span class="w-1 h-1 bg-slate-300 rounded-full"></span>
                                    <span class="text-slate-600" x-text="donation.type"></span>
                                </div>
                            </div>
                        </div>
                        <div class="text-right">
                            <div class="px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wide inline-block"
                                :class="getDonationStatusColor(donation.status)">
                                <span x-text="donation.status"></span>
                            </div>
                        </div>
                    </div>

                    <!-- Components Grid -->
                    <div class="p-6">
                        <h4 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-4">Inventory Units
                            Generated</h4>
                        <div x-show="donation.components.length === 0" class="text-slate-400 italic text-sm">No
                            components generated yet.</div>

                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                            <template x-for="comp in donation.components" :key="comp.unit_number">
                                <div class="flex items-start gap-3 p-3 bg-slate-50 rounded-lg border border-slate-100">
                                    <div class="w-10 h-10 rounded bg-white border border-slate-200 flex items-center justify-center font-bold text-xs"
                                        x-text="comp.type"></div>
                                    <div class="flex-1 min-w-0">
                                        <p class="text-sm font-bold font-mono text-slate-900 truncate"
                                            x-text="comp.unit_number"></p>
                                        <div class="flex items-center gap-2 mt-1">
                                            <span class="w-2 h-2 rounded-full"
                                                :class="getComponentStatusColor(comp.status)"></span>
                                            <span class="text-xs text-slate-600 truncate" x-text="comp.status"></span>
                                        </div>
                                    </div>
                                    <div class="text-xs text-slate-400">
                                        <div x-text="comp.location || 'Unknown'"></div>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </div>
                </div>
            </template>
        </div>

    </div>
</div>

<script>
    function donorHistory(donorId) {
        return {
            stats: { timeline: [] },
            totalComponents: 0,

            async init() {
                const res = await fetch(`/api/donors/${donorId}/history_stats/`);
                if (res.ok) {
                    this.stats = await res.json();
                    this.calculateTotals();
                }
            },

            calculateTotals() {
                if (this.stats.timeline) {
                    this.totalComponents = this.stats.timeline.reduce((acc, curr) => acc + curr.components.length, 0);
                }
            },

            getDonationStatusColor(status) {
                if (status === 'New') return 'bg-blue-100 text-blue-700';
                if (status === 'LabsCompleted') return 'bg-green-100 text-green-700';
                if (status === 'SeparationCompleted') return 'bg-yellow-100 text-yellow-700';
                return 'bg-slate-100 text-slate-600';
            },

            getComponentStatusColor(status) {
                if (status === 'Inventory') return 'bg-green-500';
                if (status === 'Discarded') return 'bg-red-500';
                return 'bg-yellow-500';
            }
        }
    }
</script>
{% endblock %}
