<!-- 11. Label Tab -->
<div x-show="currentTab === 'label'" class="animate-in fade-in slide-in-from-bottom-4 duration-500"
    x-init="fetchComponents()">
    <div class="max-w-4xl mx-auto space-y-6">
        <!-- Header -->
        <!-- Donation Code Banner -->
        <div
            class="mb-6 bg-slate-50 p-3 rounded-lg border border-slate-200 flex justify-center items-center gap-6 text-sm font-medium text-slate-700">
            <div class="flex items-center gap-2">
                <span class="text-slate-500">Donation Code:</span>
                <span class="font-bold text-red-600 text-lg font-mono" x-text="donationCode || 'Loading...'"></span>
            </div>
            <!-- Optional: Add other details if needed, e.g. DonorNumber -->
        </div>

        <div class="flex items-center justify-between">
            <div>
                <h2 class="text-2xl font-bold text-slate-900">Labeling</h2>
                <p class="text-slate-500">Print and affix initial verification labels to blood bags.</p>
            </div>
            <div class="flex gap-3">
                <span class="px-3 py-1 rounded-full text-xs font-bold"
                    :class="areAllLabeled ? 'bg-green-100 text-green-700' : 'bg-amber-100 text-amber-700'"
                    x-text="areAllLabeled ? 'Ready for Storage' : 'Pending Labels'">
                </span>
            </div>
        </div>

        <!-- Components List -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <template x-for="comp in components" :key="comp.id">
                <div class="p-4 bg-white border rounded-xl shadow-sm transition-all"
                    :class="comp.is_labeled ? 'border-green-200 bg-green-50' : 'border-slate-200'">

                    <div class="flex justify-between items-start mb-3">
                        <div class="flex items-center gap-3">
                            <div class="h-10 min-w-[2.5rem] px-2.5 rounded-lg flex items-center justify-center font-bold text-[10px] uppercase tracking-wider text-center"
                                :class="comp.is_labeled ? 'bg-green-200 text-green-800' : 'bg-slate-100 text-slate-500'">
                                <span x-text="comp.component_type"></span>
                            </div>
                            <div>
                                <p class="text-sm font-bold text-slate-900" x-text="comp.unit_number"></p>
                                <p class="text-xs text-slate-500" x-text="comp.volume + ' ml'"></p>
                            </div>
                        </div>
                        <div x-show="comp.is_labeled">
                            <svg class="w-5 h-5 text-green-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M5 13l4 4L19 7" />
                            </svg>
                        </div>
                    </div>

                    <div class="flex justify-between items-center mt-4 border-t pt-3 border-slate-100">
                        <span class="text-xs font-mono text-slate-400"
                            x-text="comp.is_labeled ? 'Labeled: ' + (comp.label_printed_at ? new Date(comp.label_printed_at).toLocaleTimeString() : 'Recently') : 'Not Labeled'"></span>
                        <button @click="printComponentLabel(comp)"
                            class="px-3 py-1.5 text-xs font-bold rounded-lg transition-colors flex items-center gap-2"
                            :class="comp.is_labeled ? 'bg-white border border-slate-200 text-slate-600 hover:bg-slate-50' : 'bg-indigo-600 text-white hover:bg-indigo-700 shadow'">
                            <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z" />
                            </svg>
                            <span x-text="comp.is_labeled ? 'Reprint' : 'Print Label'"></span>
                        </button>
                    </div>
                </div>
            </template>
            <div x-show="components.length === 0"
                class="col-span-2 text-center py-10 text-slate-400 bg-slate-50 rounded-xl border border-dashed border-slate-300">
                No components found. Please complete separation first.
            </div>
        </div>

        <!-- Actions -->
        <div class="flex justify-end pt-6 border-t border-slate-100">
            <button @click="completeLabeling()" :disabled="!areAllLabeled || components.length === 0"
                class="px-6 py-3 bg-brand-600 text-white font-bold rounded-xl shadow-lg shadow-brand-500/30 hover:bg-brand-700 disabled:opacity-50 disabled:cursor-not-allowed transition-all transform hover:-translate-y-0.5">
                Complete & Move to Storage
            </button>
        </div>
    </div>
</div>

<script>
    (function () {
        console.log("Registering Label Module...");
        window.workflowModules.label = {
            components: [],
            get areAllLabeled() {
                return this.components.length > 0 && this.components.every(c => c.is_labeled);
            },
            async fetchComponents() {
                if (!this.donationId) return;
                try {
                    const res = await fetch(`/api/donations/${this.donationId}/components/`);
                    if (res.ok) {
                        this.components = await res.json();
                    }
                } catch (e) {
                    console.error('Error fetching components', e);
                }
            },
            async printComponentLabel(component) {
                try {
                    const res = await fetch(`/api/components/${component.id}/print_label/`, {
                        method: 'POST',
                        headers: { 'X-CSRFToken': '{{ csrf_token }}' }
                    });

                    const data = await res.json();
                    if (res.ok) {
                        const idx = this.components.findIndex(c => c.id === component.id);
                        if (idx !== -1) {
                            this.components[idx].is_labeled = true;
                            this.components[idx].label_printed_at = data.printed_at;
                        }
                        console.log('Label printed:', data);
                    } else {
                        alert('Print failed: ' + (data.error || JSON.stringify(data)));
                    }
                } catch (e) {
                    alert('Label Print Error: ' + e.message);
                }
            },
            async completeLabeling() {
                if (this.components.length === 0) return;
                try {
                    const res = await fetch(`/api/workflows/${this.donationId}/complete_labeling/`, {
                        method: 'POST',
                        headers: { 'X-CSRFToken': '{{ csrf_token }}' }
                    });
                    if (res.ok) {
                        this.completeTab('label');
                        this.switchTab('lab_tests');
                    } else {
                        const data = await res.json();
                        alert('Error: ' + (data.error || data.message || 'Could not complete labeling'));
                    }
                } catch (e) {
                    this.completeTab('label');
                    this.switchTab('lab_tests');
                }
            }
        };
    })();
</script>
