<!-- 10. Adverse Reaction Tab -->
<div x-show="currentTab === 'adverse_reaction'" class="animate-in fade-in slide-in-from-bottom-4 duration-500">
    <div class="flex justify-between items-start mb-8">
        <div>
            <h3 class="text-2xl font-bold text-slate-900">Adverse Reaction</h3>
            <p class="text-slate-500">Record any adverse reactions during donation.</p>
        </div>
    </div>

    <div class="space-y-6">
        <!-- Main Toggle -->
        <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
            <h4 class="font-bold text-slate-900 mb-4">Reaction Status</h4>
            <div class="flex gap-4">
                <label class="flex-1 cursor-pointer">
                    <input type="radio" name="has_reaction" :value="false" x-model="adverseReaction.has_reaction"
                        class="peer sr-only">
                    <div
                        class="p-4 rounded-xl border-2 border-slate-200 peer-checked:border-emerald-500 peer-checked:bg-emerald-50 text-center transition-all hover:bg-slate-50">
                        <span class="block text-2xl mb-2">😊</span>
                        <span class="font-bold text-slate-700 peer-checked:text-emerald-700">No Reaction</span>
                        <p class="text-xs text-slate-500 mt-1">Donor is fine</p>
                    </div>
                </label>
                <label class="flex-1 cursor-pointer">
                    <input type="radio" name="has_reaction" :value="true" x-model="adverseReaction.has_reaction"
                        class="peer sr-only">
                    <div
                        class="p-4 rounded-xl border-2 border-slate-200 peer-checked:border-red-500 peer-checked:bg-red-50 text-center transition-all hover:bg-slate-50">
                        <span class="block text-2xl mb-2">⚠️</span>
                        <span class="font-bold text-slate-700 peer-checked:text-red-700">Adverse Reaction</span>
                        <p class="text-xs text-slate-500 mt-1">Issue occurred</p>
                    </div>
                </label>
            </div>
        </div>

        <!-- No Reaction View -->
        <div x-show="adverseReaction.has_reaction === false"
            class="text-center py-8 bg-slate-50 rounded-2xl border border-dashed border-slate-300">
            <p class="text-slate-500 font-medium mb-4">Please confirm that the donor experienced no meaningful
                adverse
                effects.</p>
            <button @click="submitAdverseReaction(true)"
                class="px-8 py-3 bg-emerald-600 hover:bg-emerald-700 text-white font-bold rounded-xl shadow-lg shadow-emerald-500/20 transition-all">
                Confirm & Continue
            </button>
        </div>

        <!-- Reaction Form -->
        <div x-show="adverseReaction.has_reaction === true" class="space-y-6">
            <!-- Types -->
            <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                <h4 class="font-bold text-slate-900 mb-4">Reaction Type</h4>
                <div class="grid grid-cols-2 md:grid-cols-3 gap-4">
                    <label
                        class="flex items-center gap-3 p-3 rounded-lg border border-slate-200 hover:bg-slate-50 cursor-pointer">
                        <input type="checkbox" x-model="adverseReaction.is_faint"
                            class="w-5 h-5 text-red-600 rounded focus:ring-red-500">
                        <span class="font-medium text-slate-700">Faint / Dizziness</span>
                    </label>
                    <label
                        class="flex items-center gap-3 p-3 rounded-lg border border-slate-200 hover:bg-slate-50 cursor-pointer">
                        <input type="checkbox" x-model="adverseReaction.is_hematoma"
                            class="w-5 h-5 text-red-600 rounded focus:ring-red-500">
                        <span class="font-medium text-slate-700">Hematoma</span>
                    </label>
                    <label
                        class="flex items-center gap-3 p-3 rounded-lg border border-slate-200 hover:bg-slate-50 cursor-pointer">
                        <input type="checkbox" x-model="adverseReaction.is_nerve_injury"
                            class="w-5 h-5 text-red-600 rounded focus:ring-red-500">
                        <span class="font-medium text-slate-700">Nerve Injury</span>
                    </label>
                    <label
                        class="flex items-center gap-3 p-3 rounded-lg border border-slate-200 hover:bg-slate-50 cursor-pointer">
                        <input type="checkbox" x-model="adverseReaction.is_arterial_puncture"
                            class="w-5 h-5 text-red-600 rounded focus:ring-red-500">
                        <span class="font-medium text-slate-700">Arterial Puncture</span>
                    </label>
                    <label
                        class="flex items-center gap-3 p-3 rounded-lg border border-slate-200 hover:bg-slate-50 cursor-pointer">
                        <input type="checkbox" x-model="adverseReaction.is_citrate_reaction"
                            class="w-5 h-5 text-red-600 rounded focus:ring-red-500">
                        <span class="font-medium text-slate-700">Citrate Reaction</span>
                    </label>
                    <label
                        class="flex items-center gap-3 p-3 rounded-lg border border-slate-200 hover:bg-slate-50 cursor-pointer">
                        <input type="checkbox" x-model="adverseReaction.is_other"
                            class="w-5 h-5 text-red-600 rounded focus:ring-red-500">
                        <span class="font-medium text-slate-700">Other</span>
                    </label>
                </div>
                <!-- Other Description -->
                <div x-show="adverseReaction.is_other" class="mt-4">
                    <label class="block text-sm font-bold text-slate-700 mb-1">Specify Other</label>
                    <input type="text" x-model="adverseReaction.other_description"
                        class="w-full px-4 py-2 border rounded-lg focus:ring-brand-500">
                </div>
            </div>

            <!-- Severity & Timeline -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                    <h4 class="font-bold text-slate-900 mb-4">Severity</h4>
                    <div class="space-y-3">
                        <label
                            class="w-full flex items-center gap-3 p-3 rounded-lg border border-slate-200 cursor-pointer"
                            :class="adverseReaction.severity === 'MILD' ? 'bg-yellow-50 border-yellow-300' : ''">
                            <input type="radio" name="severity" value="MILD" x-model="adverseReaction.severity"
                                class="w-4 h-4 text-yellow-600">
                            <div>
                                <span class="font-bold text-slate-800">Mild</span>
                                <p class="text-xs text-slate-500">Translent, quick recovery</p>
                            </div>
                        </label>
                        <label
                            class="w-full flex items-center gap-3 p-3 rounded-lg border border-slate-200 cursor-pointer"
                            :class="adverseReaction.severity === 'MODERATE' ? 'bg-orange-50 border-orange-300' : ''">
                            <input type="radio" name="severity" value="MODERATE" x-model="adverseReaction.severity"
                                class="w-4 h-4 text-orange-600">
                            <div>
                                <span class="font-bold text-slate-800">Moderate</span>
                                <p class="text-xs text-slate-500">Required intervention (fluids, etc)</p>
                            </div>
                        </label>
                        <label
                            class="w-full flex items-center gap-3 p-3 rounded-lg border border-slate-200 cursor-pointer"
                            :class="adverseReaction.severity === 'SEVERE' ? 'bg-red-50 border-red-300' : ''">
                            <input type="radio" name="severity" value="SEVERE" x-model="adverseReaction.severity"
                                class="w-4 h-4 text-red-600">
                            <div>
                                <span class="font-bold text-slate-800">Severe</span>
                                <p class="text-xs text-slate-500">Hospitalization or Abortion</p>
                            </div>
                        </label>
                    </div>
                </div>

                <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                    <h4 class="font-bold text-slate-900 mb-4">Timing & Notes</h4>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-bold text-slate-700 mb-1">Onset Time</label>
                            <input type="time" x-model="adverseReaction.onset_time"
                                class="w-full px-4 py-2 border rounded-lg focus:ring-brand-500">
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-slate-700 mb-1">Management /
                                Actions</label>
                            <textarea x-model="adverseReaction.management_notes"
                                class="w-full h-24 px-4 py-2 border rounded-lg focus:ring-brand-500"
                                placeholder="e.g. Applied ice pack, raised legs..."></textarea>
                        </div>
                    </div>
                </div>
            </div>

            <div class="flex justify-end pt-4">
                <button @click="submitAdverseReaction(false)" :disabled="submitting"
                    class="px-8 py-3 bg-red-600 hover:bg-red-700 text-white font-bold rounded-xl shadow-lg shadow-red-500/20 transition-all disabled:opacity-50">
                    <span x-show="!submitting">Save Reaction Record</span>
                    <span x-show="submitting">Saving...</span>
                </button>
            </div>
        </div>
    </div>
</div>

<script>
    (function () {
        console.log("Registering Adverse Reaction Module...");
        window.workflowModules.adverse_reaction = {
            adverseReaction: {
                has_reaction: false,
                is_faint: false,
                is_hematoma: false,
                is_nerve_injury: false,
                is_arterial_puncture: false,
                is_citrate_reaction: false,
                is_other: false,
                other_description: '',
                severity: 'MILD',
                onset_time: '',
                management_notes: ''
            },
            async submitAdverseReaction(isSkipping) {
                this.submitting = true;
                try {
                    let payload = isSkipping ? { no_reaction: true } : { ...this.adverseReaction };

                    if (!isSkipping && payload.onset_time && payload.onset_time.length === 5) {
                        payload.onset_time = `${payload.onset_time}:00`;
                    }

                    const res = await fetch(`/api/donations/${this.donationId}/save_adverse_reaction/`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-CSRFToken': '{{ csrf_token }}'
                        },
                        body: JSON.stringify(payload)
                    });

                    if (res.ok) {
                        this.completeTab('adverse_reaction');
                        this.tabs.find(t => t.id === 'survey').status = 'open';
                        this.switchTab('survey');
                    } else {
                        const data = await res.json();
                        alert('Error: ' + (data.error || JSON.stringify(data)));
                    }
                } catch (e) {
                    console.error(e);
                    alert('Network error recording reaction');
                } finally {
                    this.submitting = false;
                }
            }
        };
    })();
</script>
