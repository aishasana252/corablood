<script>
    (function () {
        console.log("Registering Blood Draw Module...");
        window.workflowModules.blood_draw = {
            async submitWithdrawal() {
                this.submitting = true;
                try {
                    const payload = { ...this.withdrawal };

                    // Time formatting for Django TimeField
                    if (payload.drawn_start_time && payload.drawn_start_time.length === 5) {
                        payload.drawn_start_time = `${payload.drawn_start_time}:00`;
                    }

                    if (!payload.drawn_end_time) {
                        const now = new Date();
                        const hours = String(now.getHours()).padStart(2, '0');
                        const minutes = String(now.getMinutes()).padStart(2, '0');
                        this.withdrawal.drawn_end_time = `${hours}:${minutes}`;
                        payload.drawn_end_time = `${hours}:${minutes}:00`;
                    } else if (payload.drawn_end_time.length === 5) {
                        payload.drawn_end_time = `${payload.drawn_end_time}:00`;
                    }

                    if (payload.first_unit_volume) payload.first_unit_volume = parseInt(payload.first_unit_volume);

                    const res = await fetch(`/api/donations/${this.donationId}/save_withdrawal/`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-CSRFToken': '{{ csrf_token }}'
                        },
                        body: JSON.stringify(payload)
                    });

                    const data = await res.json();

                    if (res.ok) {
                        this.completeTab('blood_draw');
                        this.withdrawal.segment_number = data.segment_number;
                        const headerCode = document.getElementById('header-donation-code');
                        if (headerCode) headerCode.innerText = data.donation_code || data.segment_number;

                        this.isWithdrawalEditable = false;
                        this.printLabel();

                        this.tabs.find(t => t.id === 'post_donation').status = 'open';
                        this.switchTab('post_donation');
                    } else {
                        alert('Error: ' + (data.message || data.detail || JSON.stringify(data)));
                    }
                } catch (e) {
                    console.error(e);
                    alert('Submission failed: ' + e.message);
                } finally {
                    this.submitting = false;
                }
            },
            async printLabel() {
                try {
                    await fetch(`/api/donations/${this.donationId}/print_label/`, {
                        method: 'POST',
                        headers: { 'X-CSRFToken': '{{ csrf_token }}' }
                    });
                    console.log('Label printed successfully');
                } catch (e) {
                    console.error('Print error:', e);
                }
            }
        };
    })();
</script>
