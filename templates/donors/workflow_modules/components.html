<!-- 9. Components Tab -->
<div x-show="currentTab === 'components'" class="animate-in fade-in slide-in-from-bottom-4 duration-500">
    <div class="space-y-8 p-6 bg-white rounded-xl shadow-sm border border-slate-100" x-init="fetchComponents()">
        <!-- Donation View Section -->
        <div class="space-y-4">
            <div class="flex items-center justify-between border-b pb-2 border-slate-100">
                <div class="space-y-1">
                    <h3 class="text-sm font-bold text-slate-500 uppercase tracking-tight">Donation Components</h3>
                    <h2 class="text-lg font-black text-slate-800">Donation View</h2>
                </div>
                <div>
                    <span class="px-3 py-1 bg-rose-50 text-rose-600 text-[10px] font-black uppercase rounded-full border border-rose-100" 
                          x-text="withdrawal ? withdrawal.blood_nature : 'Whole Blood'"></span>
                </div>
            </div>

            <div class="space-y-6">
                <!-- Component Type Selection -->
                <div class="w-full">
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Component type</label>
                    <select x-model="componentForm.type" 
                            class="w-full h-10 px-3 rounded border border-slate-300 focus:ring-1 focus:ring-rose-500 transition-all outline-none bg-white text-sm">
                        <option value="">--Select--</option>
                        <template x-for="type in [
                            { id: 'PRBC', name: 'PRBC', nature: 'Whole Blood' },
                            { id: 'PLT', name: 'Plat PC', nature: 'Whole Blood' },
                            { id: 'FFP', name: 'FFP', nature: 'Whole Blood' },
                            { id: 'APHERESIS', name: 'APHERESIS', nature: 'Apheresis' }
                        ].filter(t => {
                            const n = (withdrawal && withdrawal.blood_nature) ? withdrawal.blood_nature : 'Whole Blood';
                            if (n === 'Apheresis' || n === 'APHERESIS') return t.nature === 'Apheresis';
                            return t.nature === 'Whole Blood';
                        })" :key="type.id">
                            <option :value="type.id" x-text="type.name"></option>
                        </template>
                    </select>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <!-- Volume (Requested earlier, keep but smaller) -->
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1">Volume (ML)</label>
                        <input type="number" x-model="componentForm.volume"
                               class="w-full h-9 px-3 rounded border border-slate-300 text-sm">
                    </div>

                    <!-- Bacterial Contamination (ONLY FOR APHERESIS) -->
                    <template x-if="withdrawal && (withdrawal.blood_nature === 'Apheresis' || withdrawal.blood_nature === 'APHERESIS')">
                        <div>
                            <label class="block text-xs font-bold text-slate-500 mb-1">Bacterial Contamination</label>
                            <select x-model="componentForm.bacterial_contamination" 
                                    class="w-full h-9 px-3 rounded border border-slate-300 text-sm bg-white">
                                <option value="">--Select--</option>
                                <option value="Bacterial Culture">Bacterial Culture</option>
                                <option value="Bacterial Inactivation">Bacterial Inactivation</option>
                            </select>
                        </div>
                    </template>

                    <!-- Visual Inspection -->
                    <div class="flex items-center pt-6 gap-2">
                        <label class="text-xs font-bold text-slate-600">Visual Inspection</label>
                        <input type="checkbox" x-model="componentForm.visual_inspection" class="w-4 h-4 rounded text-rose-600 border-slate-300">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <!-- Storage Time -->
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1">Storage Time After Preparation</label>
                        <input type="time" x-model="componentForm.storage_time"
                               class="w-full h-9 px-3 rounded border border-slate-300 text-sm">
                    </div>
                </div>

                <!-- Notes Section -->
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Notes</label>
                    <textarea x-model="componentForm.notes" rows="2"
                              class="w-full p-3 rounded border border-slate-300 focus:ring-1 focus:ring-rose-500 transition-all outline-none bg-white text-sm resize-none"></textarea>
                </div>
            </div>

            <div class="flex items-center gap-2 mt-4">
                <button @click="submitSeparation()" 
                        :disabled="submitting || !componentForm.type"
                        class="h-9 px-6 rounded bg-slate-400 text-white text-xs font-bold hover:bg-slate-500 transition-all disabled:opacity-50">
                    Save
                </button>
                <button @click="clearForm()" 
                        class="h-9 px-6 rounded border border-slate-300 bg-white text-slate-600 text-xs font-bold hover:bg-slate-50 transition-all">
                    Clear
                </button>
            </div>
        </div>

        <!-- Components View Section -->
        <div class="space-y-4 pt-6 border-t border-slate-100">
            <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest flex items-center gap-2">
                <i class="fas fa-list-ul"></i>
                Components View
            </h3>
            
            <div class="border border-slate-100 rounded-lg bg-white min-h-[400px]">
                <table class="w-full text-left border-collapse text-[11px]">
                    <thead class="bg-slate-50 border-b border-slate-100">
                        <tr>
                            <th class="p-3 font-bold text-slate-700">#</th>
                            <th class="p-3 font-bold text-slate-700">ComponentType</th>
                            <th class="p-3 font-bold text-slate-700">Volume</th>
                            <th class="p-3 font-bold text-slate-700">Std Vol</th>
                            <th class="p-3 font-bold text-slate-700">ExpireDate</th>
                            <th class="p-3 font-bold text-slate-700">Notes</th>
                            <th class="p-3 font-bold text-slate-700">Status</th>
                            <th class="p-3 font-bold text-slate-700">Approval</th>
                            <th class="p-3 font-bold text-slate-700">Creation</th>
                            <th class="p-3 font-bold text-slate-700 text-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-slate-50">
                        <template x-for="comp in components" :key="comp.id">
                            <tr class="hover:bg-slate-50 transition-colors">
                                <td class="p-3 text-slate-600" x-text="comp.id"></td>
                                <td class="p-3 font-bold text-slate-800" x-text="comp.component_type"></td>
                                <td class="p-3 text-center">
                                    <span class="inline-block px-2 py-0.5 bg-emerald-600 text-white font-bold rounded text-[10px]" x-text="comp.volume"></span>
                                </td>
                                <td class="p-3 text-slate-500">1:500</td>
                                <td class="p-3 text-slate-600" x-text="comp.expiry_date || '---'"></td>
                                <td class="p-3">
                                    <div class="space-y-1">
                                        <div class="flex items-center gap-1">
                                            <span>Visual Inspection :</span>
                                            <i class="fas fa-check text-emerald-500" x-show="comp.visual_inspection"></i>
                                        </div>
                                        <div x-show="comp.component_type === 'APHERESIS' && comp.bacterial_contamination" class="text-slate-500 italic">
                                            - Bacterial Contamination : <span x-text="comp.bacterial_contamination"></span>
                                        </div>
                                    </div>
                                </td>
                                <td class="p-3">
                                    <div class="space-y-2">
                                        <div>
                                            <span class="px-2 py-0.5 bg-emerald-600 text-white font-bold rounded text-[9px] uppercase">Inventory</span>
                                            <div class="text-[9px] text-slate-400 mt-1" x-text="'On : ' + comp.created_at"></div>
                                            <div class="text-[8px] text-slate-400">By : system</div>
                                        </div>
                                        <div class="border-t border-slate-100 pt-1">
                                            <div class="flex items-center gap-1 text-[9px] text-emerald-600 font-bold">
                                                <i class="fas fa-check"></i>
                                                <span>Disposition Created By</span>
                                            </div>
                                            <div class="text-[8px] text-slate-400">By : system</div>
                                        </div>
                                    </div>
                                </td>
                                <td class="p-3">
                                    <div class="flex items-center gap-1 text-emerald-600 font-bold">
                                        <i class="fas fa-check text-[8px]"></i>
                                        <span>Component Verified</span>
                                    </div>
                                    <div class="text-[9px] text-slate-400">By : system</div>
                                    <div class="text-[9px] text-slate-400">On : <span x-text="comp.created_at"></span></div>
                                </td>
                                <td class="p-3">
                                    <div class="space-y-0.5 text-[9px] text-slate-400">
                                        <div>CreatedBy: <span class="text-slate-600">Admin</span></div>
                                        <div>CreatedDate: <span class="text-slate-600" x-text="comp.created_at ? comp.created_at.split(' ')[0] : '---'"></span></div>
                                    </div>
                                </td>
                                <td class="p-3 text-right">
                                    <div class="relative inline-block" x-data="{ open: false }" @click.away="open = false">
                                        <button @click="open = !open" 
                                                class="h-7 px-3 bg-[#00AEEF] text-white text-[10px] font-bold rounded shadow-sm hover:brightness-110 active:scale-95 transition-all">
                                            Actions
                                        </button>
                                        
                                        <!-- Actions Dropdown (Positioned ABOVE) -->
                                        <div x-show="open" 
                                             class="absolute right-0 bottom-full mb-1 w-48 bg-white border border-slate-200 rounded shadow-2xl z-[1000] overflow-hidden text-left py-1"
                                             x-transition:enter="transition ease-out duration-100"
                                             x-transition:enter-start="opacity-0 translate-y-2"
                                             x-transition:enter-end="opacity-100 translate-y-0">
                                            <a href="#" class="block px-4 py-2 text-slate-600 hover:bg-slate-50 border-b border-slate-50 text-[11px] transition-colors">View or Edit</a>
                                            <a href="#" class="block px-4 py-2 text-slate-600 hover:bg-slate-50 border-b border-slate-50 text-[11px] transition-colors">Print Product Label</a>
                                            <a href="#" class="block px-4 py-2 text-slate-600 hover:bg-slate-50 border-b border-slate-50 text-[11px] transition-colors">Print Final Label</a>
                                            <a href="#" class="block px-4 py-2 text-slate-600 hover:bg-slate-50 border-b border-slate-50 text-[11px] transition-colors">Disposition To Store</a>
                                            <a href="#" class="block px-4 py-2 text-slate-600 hover:bg-slate-50 border-b border-slate-50 text-[11px] transition-colors">Convert To Irradiated</a>
                                            <a href="#" class="block px-4 py-2 text-rose-600 hover:bg-rose-50 text-[11px] transition-colors font-bold">Discard Component</a>
                                        </div>
                                    </div>
                                </td>
                            </tr>
                        </template>
                        <tr x-show="components.length === 0">
                            <td colspan="10" class="p-12 text-center text-slate-400 italic">No components separated yet.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Final Submission -->
        <div class="flex justify-end pt-8">
            <button @click="confirmComponents()"
                    :disabled="!components || components.length === 0"
                    class="px-10 py-4 bg-rose-600 text-white font-black rounded-xl hover:bg-rose-700 shadow-xl shadow-rose-600/30 active:scale-95 transition-all flex items-center gap-3 disabled:opacity-50 disabled:grayscale">
                Complete Process & Next
                <i class="fas fa-arrow-right text-xs"></i>
            </button>
        </div>
    </div>
</div>

<script>
    (function () {
        console.log("Registering Components Module...");
        window.workflowModules.components = {
            componentForm: {
                type: '',
                volume: '',
                bacterial_contamination: 'Negative',
                visual_inspection: true,
                storage_time: '',
                notes: ''
            },
            get availableComponentTypes() {
                // Determine nature from clinical record OR workflow config fallback
                let nature = (this.withdrawal && this.withdrawal.blood_nature) ? this.withdrawal.blood_nature : this.workflow_type;
                
                // Normalization
                if (nature === 'WHOLE_BLOOD' || nature === 'Whole Blood') {
                    return [
                        { id: 'PRBC', name: 'PRBC' },
                        { id: 'PLT', name: 'Plat PC' },
                        { id: 'FFP', name: 'FFP' }
                    ];
                } else if (nature === 'Apheresis' || nature === 'APHERESIS') {
                    return [{ id: 'APHERESIS', name: 'APHERESIS' }];
                }
                
                // Fallback: Default to Whole Blood options if unsure
                return [
                    { id: 'PRBC', name: 'PRBC' },
                    { id: 'PLT', name: 'Plat PC' },
                    { id: 'FFP', name: 'FFP' }
                ];
            },
            async submitSeparation() {
                if (!this.componentForm.type) {
                    alert('Please select a component type');
                    return;
                }
                this.submitting = true;
                try {
                    const payload = {
                        type: this.componentForm.type,
                        volume: parseInt(this.componentForm.volume) || 0,
                        visual_inspection: this.componentForm.visual_inspection,
                        storage_time: this.componentForm.storage_time,
                        notes: this.componentForm.notes,
                        bacterial_contamination: this.componentForm.bacterial_contamination
                    };

                    const res = await fetch(`/api/donations/${this.donationId}/separate_components/`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-CSRFToken': '{{ csrf_token }}'
                        },
                        body: JSON.stringify({ components: [payload] }) // Single add for now
                    });

                    const data = await res.json();
                    if (res.ok) {
                        this.fetchComponents(); // Refresh the list
                        this.clearForm();
                    } else {
                        alert('Error: ' + data.error);
                    }
                } catch (e) {
                    console.error(e);
                    alert('Network Error');
                } finally {
                    this.submitting = false;
                }
            },
            clearForm() {
                this.componentForm = {
                    type: '',
                    volume: '',
                    bacterial_contamination: 'Negative',
                    visual_inspection: true,
                    storage_time: '',
                    notes: ''
                };
            },
            async fetchComponents() {
                try {
                    const res = await fetch(`/api/donations/${this.donationId}/get_components/`);
                    if (res.ok) {
                        const data = await res.json();
                        this.generatedComponents = data;
                        this.components = data;
                    }
                } catch(e) {}
            },
            confirmComponents() {
                this.completeTab('components');
            }
        };
    })();
</script>
