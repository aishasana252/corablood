{% extends 'base.html' %}

{% block title %}Patient Orders | CoraBlood AI{% endblock %}
{% block header %}
<div class="flex justify-between items-center w-full">
    <span x-text="lang === 'en' ? 'Transfusion Orders' : 'طلبات نقل الدم'"></span>
    <a href="{% url 'new-order' %}"
        class="bg-brand-600 hover:bg-brand-700 text-white text-sm px-4 py-2 rounded-xl flex items-center gap-2 transition-colors">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
        </svg>
        <span x-text="lang === 'en' ? 'New Request' : 'طلب جديد'"></span>
    </a>
</div>
{% endblock %}

{% block content %}
<div class="space-y-6" x-data="ordersDashboard()">

    <!-- Orders Grid -->
    <div class="bg-white rounded-[2rem] shadow-sm border border-slate-100 overflow-hidden">
        <div class="overflow-x-auto">
            <table class="w-full text-left">
                <thead class="bg-slate-50 border-b border-slate-100">
                    <tr>
                        <th class="px-6 py-4 text-xs font-bold text-slate-400 uppercase tracking-wider">Priority</th>
                        <th class="px-6 py-4 text-xs font-bold text-slate-400 uppercase tracking-wider">Req Code</th>
                        <th class="px-6 py-4 text-xs font-bold text-slate-400 uppercase tracking-wider">Patient Details
                        </th>
                        <th class="px-6 py-4 text-xs font-bold text-slate-400 uppercase tracking-wider">Required</th>
                        <th class="px-6 py-4 text-xs font-bold text-slate-400 uppercase tracking-wider">Status</th>
                        <th class="px-6 py-4 text-xs font-bold text-slate-400 uppercase tracking-wider">Action</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-slate-100">
                    <template x-for="item in items" :key="item.id">
                        <tr class="hover:bg-slate-50/50 transition-colors group">
                            <!-- Priority Check -->
                            <td class="px-6 py-4">
                                <span class="px-2 py-1 rounded text-xs font-bold uppercase tracking-wider"
                                    :class="item.priority === 'STAT' ? 'bg-rose-100 text-rose-700 animate-pulse' : 'bg-slate-100 text-slate-600'"
                                    x-text="item.priority"></span>
                            </td>
                            <td class="px-6 py-4 font-mono font-medium text-slate-600" x-text="item.request_code"></td>
                            <td class="px-6 py-4">
                                <div class="flex flex-col">
                                    <span class="font-bold text-slate-800" x-text="item.patient_name"></span>
                                    <span class="text-xs text-slate-500 font-mono" x-text="item.patient_mrn"></span>
                                </div>
                            </td>
                            <td class="px-6 py-4">
                                <span class="font-bold text-slate-700"
                                    x-text="item.quantity + 'x ' + item.required_component"></span>
                                <span class="text-xs font-bold ml-1 px-1.5 py-0.5 rounded bg-slate-100 text-slate-500"
                                    x-text="item.required_blood_group"></span>
                            </td>
                            <td class="px-6 py-4">
                                <span class="px-2 py-1 rounded text-xs font-bold" :class="{
                                        'bg-blue-50 text-blue-700': item.status === 'New',
                                        'bg-purple-50 text-purple-700': item.status === 'CrossMatched',
                                        'bg-green-50 text-green-700': item.status === 'Issued'
                                    }" x-text="item.status"></span>
                            </td>
                            <td class="px-6 py-4">
                                <div class="flex gap-2">
                                    <!-- Crossmatch Button -->
                                    <button x-show="item.status === 'New' && item.priority !== 'STAT'"
                                        class="text-xs bg-purple-50 text-purple-600 px-3 py-1.5 rounded-lg hover:bg-purple-100 transition-colors font-bold">
                                        Crossmatch
                                    </button>

                                    <!-- Issue Button -->
                                    <button x-show="item.status === 'CrossMatched' || item.priority === 'STAT'"
                                        class="text-xs bg-slate-900 text-white px-3 py-1.5 rounded-lg hover:bg-brand-600 transition-colors font-bold flex items-center gap-1">
                                        <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                                d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                                        </svg>
                                        Issue
                                    </button>
                                </div>
                            </td>
                        </tr>
                    </template>
                    <tr x-show="items.length === 0">
                        <td colspan="6" class="px-6 py-12 text-center text-slate-400">
                            No active orders.
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    function ordersDashboard() {
        return {
            items: [],

            async init() {
                // In production, endpoints would perform aggregation
                const res = await fetch('/api/orders/requests/');
                const data = await res.json();
                this.items = data.sort((a, b) => {
                    if (a.priority === 'STAT' && b.priority !== 'STAT') return -1;
                    if (a.priority !== 'STAT' && b.priority === 'STAT') return 1;
                    return new Date(b.created_at) - new Date(a.created_at);
                });
            }
        }
    }
</script>
{% endblock %}
