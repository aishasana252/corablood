{% extends 'base.html' %}
{% block title %}New Order | CoraBlood{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto">
    <div class="bg-white rounded-2xl shadow-xl border border-slate-100 overflow-hidden">
        <div class="bg-slate-900 p-6 border-b border-slate-800">
            <h1 class="text-2xl font-bold text-white">Create Blood Request</h1>
            <p class="text-slate-400">Submit a new request for blood products.</p>
        </div>

        <form method="POST" class="p-8 space-y-6">
            {% csrf_token %}

            <!-- Patient Info -->
            <div class="grid grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">Patient Name</label>
                    <input type="text" name="patient_full_name" required
                        class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-brand-500 focus:border-brand-500">
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">MRN (File Number)</label>
                    <input type="text" name="patient_mrn" required
                        class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-brand-500 focus:border-brand-500">
                </div>
            </div>

            <div class="grid grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">Patient Blood Group</label>
                    <select name="patient_blood_group" required
                        class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-brand-500 focus:border-brand-500">
                        <option value="O+">O+</option>
                        <option value="O-">O-</option>
                        <option value="A+">A+</option>
                        <option value="A-">A-</option>
                        <option value="B+">B+</option>
                        <option value="B-">B-</option>
                        <option value="AB+">AB+</option>
                        <option value="AB-">AB-</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">Hospital Ward</label>
                    <input type="text" name="hospital_ward" required placeholder="e.g. ER, ICU, Ward 3"
                        class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-brand-500 focus:border-brand-500">
                </div>
            </div>

            <hr class="border-slate-100">

            <!-- Request Details -->
            <div class="grid grid-cols-3 gap-6">
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">Component</label>
                    <select name="component_type" required
                        class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-brand-500 focus:border-brand-500">
                        <option value="PRBC">Packed Red Cells (PRBC)</option>
                        <option value="FFP">Fresh Frozen Plasma (FFP)</option>
                        <option value="PLT">Platelets (PLT)</option>
                        <option value="CRYO">Cryoprecipitate</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">Units Required</label>
                    <input type="number" name="units_requested" value="1" min="1" max="10" required
                        class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-brand-500 focus:border-brand-500">
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">Urgency</label>
                    <select name="urgency" required
                        class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-brand-500 focus:border-brand-500 font-bold">
                        <option value="ROUTINE" class="text-slate-700">Routine</option>
                        <option value="URGENT" class="text-amber-600">Urgent</option>
                        <option value="EMERGENCY" class="text-red-600">EMERGENCY (Life Threatening)</option>
                    </select>
                </div>
            </div>

            <div class="pt-6 flex justify-end gap-3">
                <a href="{% url 'order_list' %}"
                    class="px-6 py-2 text-slate-600 font-bold hover:bg-slate-100 rounded-lg transition-colors">Cancel</a>
                <button type="submit"
                    class="px-8 py-2 bg-brand-600 text-white font-bold rounded-lg shadow-lg shadow-brand-500/30 hover:bg-brand-700 transition-all">Submit
                    Request</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
