<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CoraBlood Ultimate</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
        }
    </style>
</head>

<body class="bg-slate-900 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden flex flex-col">
        <div class="p-10">
            <div class="flex flex-col items-center mb-8">
                <div
                    class="h-12 w-12 bg-rose-600 rounded-xl flex items-center justify-center shadow-lg shadow-rose-500/30 mb-4">
                    <svg class="w-7 h-7 text-white" fill="currentColor" viewBox="0 0 20 20">
                        <path
                            d="M7.707 10.293a1 1 0 10-1.414 1.414l3 3a1 1 0 001.414 0l3-3a1 1 0 00-1.414-1.414L11 11.586V6h5a2 2 0 012 2v7a2 2 0 01-2 2H4a2 2 0 01-2-2V8a2 2 0 012-2h5v5.586l-1.293-1.293zM9 4a1 1 0 012 0v2H9V4z" />
                    </svg>
                </div>
                <h1 class="text-2xl font-bold text-slate-900">CoraBlood Ultimate</h1>
                <p class="text-sm text-slate-500">Sign in to access the system</p>
            </div>

            <form method="post" action="{% url 'login' %}">
                {% csrf_token %}

                {% if form.errors %}
                <div class="mb-4 bg-rose-50 border border-rose-200 text-rose-600 px-4 py-3 rounded-xl text-sm">
                    Invalid username or password.
                </div>
                {% endif %}

                <div class="space-y-5">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Username</label>
                        <input type="text" name="username" required
                            class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-rose-500 focus:ring-2 focus:ring-rose-500/20 outline-none transition-all placeholder-slate-400"
                            placeholder="Enter your username">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Password</label>
                        <input type="password" name="password" required
                            class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:border-rose-500 focus:ring-2 focus:ring-rose-500/20 outline-none transition-all placeholder-slate-400"
                            placeholder="••••••••">
                    </div>

                    <button type="submit"
                        class="w-full py-3 px-4 bg-rose-600 hover:bg-rose-700 text-white font-bold rounded-xl shadow-lg shadow-rose-500/30 transition-all transform active:scale-95">
                        Sign In
                    </button>
                </div>
            </form>
        </div>
        <div class="bg-slate-50 p-6 text-center border-t border-slate-100">
            <p class="text-xs text-slate-400">Restricted Access • Authorized Personnel Only</p>
        </div>
    </div>

</body>

</html>
