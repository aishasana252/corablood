{% extends 'base.html' %}

{% block title %}Blood Request | CoraBlood AI{% endblock %}
{% block header %}Blood Request{% endblock %}

{% block content %}
<div class="bg-white rounded-lg border border-slate-200 shadow-sm p-6" x-data="{
    rows: [
        { component: 'PRBC', quantity: '', result: { label: 'HGB', value: '' }, duration: '' },
        { component: 'FFP', quantity: '', result: { label: 'INR', value: '' }, duration: '' },
        { component: 'PLT', quantity: '', result: { label: 'PLTCount', value: '' }, duration: '' },
        { component: 'CRYO', quantity: '', result: null, duration: '' }
    ]
}">
    <!-- Top Row: Patient MRN -->
    <div class="mb-4 flex items-center gap-4">
        <label class="w-24 text-sm font-bold text-slate-800">Patient MRN</label>
        <button
            class="px-3 py-1.5 bg-orange-500 hover:bg-orange-600 text-white text-xs font-semibold rounded shadow-sm transition-colors">
            Select Patient
        </button>
    </div>

    <!-- Department -->
    <div class="mb-4">
        <label class="block text-xs font-bold text-slate-800 mb-1">Department</label>
        <select
            class="w-full md:w-1/3 rounded border-slate-300 px-3 py-2 text-sm focus:ring-brand-500 focus:border-brand-500">
            <option disabled selected></option>
            <option>ER</option>
            <option>ICU</option>
            <option>Ward</option>
        </select>
        <div class="h-0.5 w-8 bg-red-500 mt-0.5"></div>
    </div>

    <!-- Reason for Transfusion -->
    <div class="mb-4">
        <label class="block text-xs font-bold text-slate-800 mb-1">Reason for Transfusion</label>
        <input type="text" placeholder="Reason For Transfusion"
            class="w-full rounded border-slate-300 px-3 py-2 text-sm focus:ring-brand-500 focus:border-brand-500 placeholder-slate-300">
    </div>

    <!-- Diagnosis -->
    <div class="mb-4">
        <label class="block text-xs font-bold text-slate-800 mb-1">Diagnosis</label>
        <div class="relative">
            <div class="absolute inset-y-0 left-0 w-0.5 bg-red-500"></div>
            <input type="text" placeholder="Diagnosis"
                class="w-full rounded border-slate-300 px-3 py-2 text-sm focus:ring-brand-500 focus:border-brand-500 pl-3 placeholder-slate-300">
        </div>
    </div>

    <!-- Request Type -->
    <div class="mb-6">
        <label class="block text-xs font-bold text-slate-800 mb-1">Request Type</label>
        <div class="relative w-full md:w-1/3">
            <div class="absolute inset-y-0 left-0 w-0.5 bg-red-500"></div>
            <select
                class="w-full rounded border-slate-300 px-3 py-2 text-sm focus:ring-brand-500 focus:border-brand-500 pl-3">
                <option disabled selected></option>
                <option>Type & Screen</option>
                <option>Crossmatch</option>
            </select>
        </div>
    </div>

    <!-- Component Table Section -->
    <div class="flex flex-col md:flex-row gap-8 mb-8">
        <!-- Left Data Table -->
        <div class="flex-1">
            <div class="grid grid-cols-12 gap-x-4 gap-y-2 place-items-center mb-2">
                <div class="col-span-2 text-xs font-bold text-slate-800 self-end justify-self-start">Component</div>
                <div class="col-span-3 text-xs font-bold text-slate-800 self-end justify-self-start">Quantity</div>
                <div class="col-span-4 text-xs font-bold text-slate-800 self-end justify-self-start pl-8">Result</div>
                <div class="col-span-3 text-xs font-bold text-slate-800 self-end justify-self-start">Duration of
                    Transfusion</div>
            </div>

            <!-- PRBC Row -->
            <div class="grid grid-cols-12 gap-x-4 gap-y-4 place-items-center mb-4">
                <div class="col-span-2 text-xs text-slate-600 justify-self-start font-medium">PRBC</div>
                <div class="col-span-3 w-full"><input type="text" placeholder="Qty"
                        class="w-full rounded border-slate-300 px-2 py-1.5 text-xs focus:ring-brand-500 focus:border-brand-500 placeholder-slate-400">
                </div>
                <div class="col-span-4 w-full flex items-center gap-2">
                    <span class="text-xs text-slate-600 font-medium w-8 text-right">HGB</span>
                    <input type="text" placeholder="HGB"
                        class="flex-1 rounded border-slate-300 px-2 py-1.5 text-xs focus:ring-brand-500 focus:border-brand-500 placeholder-slate-400">
                </div>
                <div class="col-span-3 w-full">
                    <select
                        class="w-full rounded border-slate-300 px-2 py-1.5 text-xs focus:ring-brand-500 focus:border-brand-500"></select>
                </div>
            </div>

            <!-- FFP Row -->
            <div class="grid grid-cols-12 gap-x-4 gap-y-4 place-items-center mb-4">
                <div class="col-span-2 text-xs text-slate-600 justify-self-start font-medium">FFP</div>
                <div class="col-span-3 w-full"><input type="text" placeholder="Qty"
                        class="w-full rounded border-slate-300 px-2 py-1.5 text-xs focus:ring-brand-500 focus:border-brand-500 placeholder-slate-400">
                </div>
                <div class="col-span-4 w-full flex items-center gap-2">
                    <span class="text-xs text-slate-600 font-medium w-8 text-right">INR</span>
                    <input type="text" placeholder="INR"
                        class="flex-1 rounded border-slate-300 px-2 py-1.5 text-xs focus:ring-brand-500 focus:border-brand-500 placeholder-slate-400">
                </div>
                <div class="col-span-3 w-full">
                    <select
                        class="w-full rounded border-slate-300 px-2 py-1.5 text-xs focus:ring-brand-500 focus:border-brand-500"></select>
                </div>
            </div>

            <!-- PLT Row -->
            <div class="grid grid-cols-12 gap-x-4 gap-y-4 place-items-center mb-4">
                <div class="col-span-2 text-xs text-slate-600 justify-self-start font-medium">PLT</div>
                <div class="col-span-3 w-full"><input type="text" placeholder="Qty"
                        class="w-full rounded border-slate-300 px-2 py-1.5 text-xs focus:ring-brand-500 focus:border-brand-500 placeholder-slate-400">
                </div>
                <div class="col-span-4 w-full flex items-center gap-2">
                    <span class="text-xs text-slate-600 font-medium w-8 text-right">PLTCount</span>
                    <input type="text" placeholder="PLTCount"
                        class="flex-1 rounded border-slate-300 px-2 py-1.5 text-xs focus:ring-brand-500 focus:border-brand-500 placeholder-slate-400">
                </div>
                <div class="col-span-3 w-full">
                    <select
                        class="w-full rounded border-slate-300 px-2 py-1.5 text-xs focus:ring-brand-500 focus:border-brand-500"></select>
                </div>
            </div>

            <!-- CRYO Row -->
            <div class="grid grid-cols-12 gap-x-4 gap-y-4 place-items-center mb-4">
                <div class="col-span-2 text-xs text-slate-600 justify-self-start font-medium">CRYO</div>
                <div class="col-span-3 w-full"><input type="text" placeholder="Qty"
                        class="w-full rounded border-slate-300 px-2 py-1.5 text-xs focus:ring-brand-500 focus:border-brand-500 placeholder-slate-400">
                </div>
                <div class="col-span-4 w-full"></div> <!-- Empty Result Col -->
                <div class="col-span-3 w-full">
                    <select
                        class="w-full rounded border-slate-300 px-2 py-1.5 text-xs focus:ring-brand-500 focus:border-brand-500"></select>
                </div>
            </div>
        </div>

        <!-- Right Checkbox Options -->
        <div class="w-1/3 pt-8 space-y-4">
            <div class="flex items-start gap-2">
                <input type="radio" name="crossmatch" class="mt-0.5 text-brand-600 focus:ring-brand-500 rounded-full">
                <label class="text-xs font-bold text-slate-700">UnCrossmatched - Type Specific</label>
            </div>
            <div class="flex items-start gap-2">
                <input type="radio" name="crossmatch" class="mt-0.5 text-brand-600 focus:ring-brand-500 rounded-full">
                <div class="flex items-center gap-2">
                    <label class="text-xs font-bold text-slate-700">UnCrossmatched - Group: 'O' Rh: Negative</label>
                    <span class="text-red-600 font-bold text-sm cursor-pointer hover:bg-red-50 rounded px-1">✖</span>
                </div>
            </div>
        </div>
    </div>

    <hr class="border-slate-100 mb-6">

    <!-- Bottom Section -->
    <div class="space-y-6">
        <!-- Blood Group Dropdown -->
        <div class="w-64">
            <label class="block text-sm font-bold text-slate-800 mb-1">Blood Group</label>
            <select
                class="w-full rounded border-slate-300 px-3 py-2 text-sm focus:ring-brand-500 focus:border-brand-500">
                <option>UnKnown</option>
                <option>A+</option>
                <option>O+</option>
            </select>
        </div>

        <!-- Checkboxes -->
        <div class="space-y-3">
            <div class="flex items-center gap-2">
                <input type="checkbox" checked class="rounded text-brand-600 focus:ring-brand-500 w-4 h-4">
                <label class="text-sm font-bold text-slate-800">Must Take another sample by different event</label>
            </div>
            <div class="flex items-center gap-2">
                <div class="border-2 border-red-500 rounded-sm p-0.5">
                    <div class="w-3 h-3"></div> <!-- Empty Box simulation -->
                </div>
                <!-- <input type="checkbox" class="rounded text-brand-600 focus:ring-brand-500 w-4 h-4 border-2 border-red-500"> -->
                <label class="text-sm font-bold text-slate-800">Blood Transfusion consent Signed</label>
            </div>
        </div>

        <!-- Priority -->
        <div class="w-64">
            <label class="block text-sm font-bold text-slate-800 mb-1">Priority</label>
            <select
                class="w-full rounded border-slate-300 px-3 py-2 text-sm focus:ring-brand-500 focus:border-brand-500">
                <option>Normal</option>
                <option>STAT</option>
            </select>
        </div>

        <!-- Actions -->
        <div class="flex items-center gap-2 pt-4">
            <button
                class="px-6 py-2 bg-sky-500 hover:bg-sky-600 text-white font-medium rounded shadow-sm text-sm transition-colors">
                Save
            </button>
            <a href="{% url 'blood_requests_old' %}"
                class="px-6 py-2 bg-slate-100 hover:bg-slate-200 text-slate-700 font-medium rounded shadow-sm text-sm transition-colors">
                back
            </a>
        </div>
    </div>
</div>
{% endblock %}
